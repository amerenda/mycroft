<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycroft Agent Studio</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
</head>
<body>
<header>
  <h1>Mycroft Agent Studio</h1>
  <nav>
    <button class="tab active" data-tab="runner">Test Runner</button>
    <button class="tab" data-tab="reports">Reports</button>
    <button class="tab" data-tab="tasks">Tasks</button>
  </nav>
</header>

<main>
  <!-- Test Runner Tab -->
  <section id="tab-runner" class="tab-content active">
    <div class="split">
      <div class="panel left">
        <h2>Configure Run</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Runner</label>
            <select id="runner" onchange="setRunner(this.value)">
              <option value="mycroft" selected>Mycroft</option>
              <option value="forge">Forge</option>
            </select>
          </div>
          <div class="form-group">
            <label>Model</label>
            <select id="model"><option value="">Default (qwen3:14b)</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Repo</label>
            <input id="repo" type="text" placeholder="amerenda/mycroft" value="amerenda/mycroft">
          </div>
          <div class="form-group" id="agentTypeGroup">
            <label>Agent Type</label>
            <select id="agentType" onchange="onAgentTypeChange()">
              <option value="coder">coder</option>
              <option value="researcher">researcher</option>
            </select>
          </div>
          <div class="form-group" id="effortGroup" style="display:none">
            <label>Effort</label>
            <select id="effort">
              <option value="light">Light (quick, 1-2 sources)</option>
              <option value="regular" selected>Regular (3-5 sources)</option>
              <option value="deep">Deep (thorough, 8-15 sources)</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Instruction</label>
          <textarea id="instruction" rows="3" placeholder="e.g. In calculator.py, add a multiply function and write tests for it"></textarea>
        </div>
        <details>
          <summary>Advanced Options</summary>
          <div class="form-row" style="margin-top:8px">
            <div class="form-group">
              <label>Max Tokens</label>
              <input id="maxTokens" type="number" value="4096" min="256" max="32768">
            </div>
            <div class="form-group">
              <label>Temperature</label>
              <input id="temperature" type="number" value="" step="0.1" min="0" max="2" placeholder="Default">
            </div>
            <div class="form-group">
              <label>Max Iterations</label>
              <input id="maxIterations" type="number" value="" min="1" max="50" placeholder="Default">
            </div>
          </div>
          <div class="form-group">
            <label>System Prompt Override</label>
            <textarea id="systemPrompt" rows="8" placeholder="Leave empty for default from agent manifest."></textarea>
          </div>
        </details>
        <div class="actions">
          <button class="btn-primary" id="runBtn" onclick="runTask()">Run Task</button>
          <button class="btn-secondary" onclick="previewPrompt()" id="previewBtn">Preview Prompt</button>
        </div>
      </div>

      <div class="panel right">
        <h2>Tool Call Trace <span id="traceStatus" class="status-badge"></span></h2>
        <div id="traceContent" class="trace">
          <p class="empty">Run a task to see the tool call trace here.</p>
        </div>
        <div id="queueStats" class="queue-stats" style="display:none"></div>
      </div>
    </div>

    <!-- Prompt Preview -->
    <div id="promptPanel" class="panel" style="display:none">
      <h2>Prompt Preview</h2>
      <div id="promptContent"></div>
    </div>
  </section>

  <!-- Reports Tab -->
  <section id="tab-reports" class="tab-content">
    <div class="panel">
      <div class="tasks-header">
        <h2>Research Reports</h2>
        <button class="btn-danger" onclick="clearAllReports()">Delete All</button>
      </div>
      <div id="reportList">Loading...</div>
    </div>

    <div id="reportPanel" class="panel" style="display:none">
      <div class="tasks-header">
        <h2 id="reportTitle"></h2>
        <button class="btn-delete" onclick="deleteCurrentReport()" title="Delete">Delete</button>
      </div>
      <div class="report-meta" id="reportMeta"></div>
      <div id="reportContent" class="report-body"></div>
    </div>
  </section>

  <!-- Tasks Tab -->
  <section id="tab-tasks" class="tab-content">
    <div class="panel">
      <div class="tasks-header">
        <h2>Recent Tasks</h2>
        <button class="btn-danger" onclick="clearAllTasks()">Clear All</button>
      </div>
      <div id="taskList">Loading...</div>
    </div>

    <div id="conversationPanel" class="panel" style="display:none">
      <h2>Conversation <span id="convTaskId"></span></h2>
      <div id="conversationContent"></div>
    </div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
