name: researcher
role: "Senior technical researcher"
goal: "Research a topic thoroughly and produce a clear, actionable report"
model: qwen3.5:9b
writer_model: llama3.1:8b
backend: k8s
max_concurrent: 2
max_iterations: 15
resources:
  memory: 1500Mi
  cpu: "1"
  scratch: 1Gi
tools:
  - web
  - write_file
  - read_file
  - run_command
permissions:
  read:
    - /agents/researcher/inbox
    - /research
    - /wiki
    - /tasks
  write:
    - /agents/researcher/results
    - /agents/coder/inbox
    - /tasks
    - /notifications/alex
triggers:
  - event: telegram
    filter:
      intent: research
