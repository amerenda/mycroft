name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]

env:
  IMAGE: amerenda/mycroft
  GITOPS_REPO: amerenda/k3s-dean-gitops

jobs:
  test:
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt -r requirements-test.txt
      - run: python -m pytest tests/ -v

  set-tag:
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      pr_prefix: ${{ steps.tag.outputs.pr_prefix }}
    steps:
      - id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/release/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/release/}"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=release" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=deploy" >> "$GITHUB_OUTPUT"
          fi

  # Detect which components actually changed so we can skip unnecessary builds.
  # Always rebuilds everything on workflow_dispatch or tag push.
  changes:
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    outputs:
      agent: ${{ steps.detect.outputs.agent }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: detect
        run: |
          # Force full rebuild on manual dispatch or release tag
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "agent=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # On push, diff against the commit before the push
          BEFORE="${{ github.event.before }}"
          CHANGED=$(git diff --name-only "${BEFORE}" HEAD 2>/dev/null || echo "ALL")

          # Agent inputs: base Dockerfile, agent Dockerfile, requirements, and
          # all three code directories copied into the image.
          if [[ "$CHANGED" == "ALL" ]] || \
             echo "$CHANGED" | grep -qE '^(Dockerfile\.agent|requirements-agent\.txt|common/|runtime/|agents/)'; then
            echo "agent=true" >> "$GITHUB_OUTPUT"
          else
            echo "agent=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Agent base (heavy layer, only rebuild when agent inputs change) ─────────

  build-base-amd64:
    needs: [test, set-tag, changes]
    if: github.event_name != 'pull_request' && needs.changes.outputs.agent == 'true'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
      - name: Build agent-base
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          docker build -f Dockerfile.agent-base -t "${IMAGE}:agent-base-${TAG}-amd64" .
          docker push "${IMAGE}:agent-base-${TAG}-amd64"

  build-base-arm64:
    needs: [test, set-tag, changes]
    if: github.event_name != 'pull_request' && needs.changes.outputs.agent == 'true'
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
      - name: Build agent-base
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          docker build -f Dockerfile.agent-base -t "${IMAGE}:agent-base-${TAG}-arm64" .
          docker push "${IMAGE}:agent-base-${TAG}-arm64"

  manifest-base:
    needs: [set-tag, changes, build-base-amd64, build-base-arm64]
    if: github.event_name != 'pull_request' && needs.changes.outputs.agent == 'true'
    runs-on: arc-runner-set
    steps:
      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
      - name: Create agent-base multi-arch manifest
        env:
          TAG: ${{ needs.set-tag.outputs.tag }}
        run: |
          docker buildx imagetools create -t "${IMAGE}:agent-base-${TAG}" \
            "${IMAGE}:agent-base-${TAG}-amd64" \
            "${IMAGE}:agent-base-${TAG}-arm64"
          docker buildx imagetools create -t "${IMAGE}:agent-base-latest" \
            "${IMAGE}:agent-base-${TAG}-amd64" \
            "${IMAGE}:agent-base-${TAG}-arm64"

  # ── Coordinator + frontend (independent of agent-base, always build) ────────

  build-amd64:
    needs: [test, set-tag]
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: coordinator
            dockerfile: Dockerfile.coordinator
          - component: frontend
            dockerfile: Dockerfile.frontend
    env:
      TAG: ${{ needs.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
      - name: Build and push ${{ matrix.component }} (amd64)
        run: |
          docker build -f ${{ matrix.dockerfile }} \
            -t "${IMAGE}:${{ matrix.component }}-${TAG}-amd64" .
          docker push "${IMAGE}:${{ matrix.component }}-${TAG}-amd64"

  build-arm64:
    needs: [test, set-tag]
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
      - name: Build coordinator
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          docker build -f Dockerfile.coordinator -t "${IMAGE}:coordinator-${TAG}-arm64" .
          docker push "${IMAGE}:coordinator-${TAG}-arm64"
      - name: Build frontend
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          docker build -f Dockerfile.frontend -t "${IMAGE}:frontend-${TAG}-arm64" .
          docker push "${IMAGE}:frontend-${TAG}-arm64"

  # ── Agent variants (only when agent inputs changed) ─────────────────────────

  build-agents-amd64:
    needs: [set-tag, changes, manifest-base]
    if: github.event_name != 'pull_request' && needs.changes.outputs.agent == 'true'
    runs-on: arc-runner-set
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: agent-coder
            target: agent-coder
          - component: agent-researcher
            target: agent-researcher
    env:
      TAG: ${{ needs.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
      - name: Build and push ${{ matrix.component }} (amd64)
        run: |
          docker build -f Dockerfile.agent \
            --target ${{ matrix.target }} \
            --build-arg BASE_TAG=${TAG} \
            -t "${IMAGE}:${{ matrix.component }}-${TAG}-amd64" .
          docker push "${IMAGE}:${{ matrix.component }}-${TAG}-amd64"

  build-agents-arm64:
    needs: [set-tag, changes, manifest-base]
    if: github.event_name != 'pull_request' && needs.changes.outputs.agent == 'true'
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
      - name: Build agent-coder
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          docker build -f Dockerfile.agent --target agent-coder \
            --build-arg BASE_TAG=${TAG} \
            -t "${IMAGE}:agent-coder-${TAG}-arm64" .
          docker push "${IMAGE}:agent-coder-${TAG}-arm64"
      - name: Build agent-researcher
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          docker build -f Dockerfile.agent --target agent-researcher \
            --build-arg BASE_TAG=${TAG} \
            -t "${IMAGE}:agent-researcher-${TAG}-arm64" .
          docker push "${IMAGE}:agent-researcher-${TAG}-arm64"

  # ── Manifests ────────────────────────────────────────────────────────────────

  manifest:
    needs: [set-tag, changes, build-amd64, build-arm64, build-agents-amd64, build-agents-arm64]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.build-amd64.result == 'success' &&
      needs.build-arm64.result == 'success' &&
      (needs.build-agents-amd64.result == 'success' || needs.build-agents-amd64.result == 'skipped') &&
      (needs.build-agents-arm64.result == 'success' || needs.build-agents-arm64.result == 'skipped')
    runs-on: arc-runner-set
    steps:
      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
      - name: Create multi-arch manifests
        env:
          TAG: ${{ needs.set-tag.outputs.tag }}
          AGENT_CHANGED: ${{ needs.changes.outputs.agent }}
        run: |
          for COMPONENT in coordinator frontend; do
            docker buildx imagetools create -t "${IMAGE}:${COMPONENT}-${TAG}" \
              "${IMAGE}:${COMPONENT}-${TAG}-amd64" \
              "${IMAGE}:${COMPONENT}-${TAG}-arm64"
            docker buildx imagetools create -t "${IMAGE}:${COMPONENT}-latest" \
              "${IMAGE}:${COMPONENT}-${TAG}-amd64" \
              "${IMAGE}:${COMPONENT}-${TAG}-arm64"
          done
          if [[ "${AGENT_CHANGED}" == "true" ]]; then
            for COMPONENT in agent-coder agent-researcher; do
              docker buildx imagetools create -t "${IMAGE}:${COMPONENT}-${TAG}" \
                "${IMAGE}:${COMPONENT}-${TAG}-amd64" \
                "${IMAGE}:${COMPONENT}-${TAG}-arm64"
              docker buildx imagetools create -t "${IMAGE}:${COMPONENT}-latest" \
                "${IMAGE}:${COMPONENT}-${TAG}-amd64" \
                "${IMAGE}:${COMPONENT}-${TAG}-arm64"
            done
          fi

  # ── Deploy ───────────────────────────────────────────────────────────────────

  deploy:
    needs: [set-tag, changes, build-amd64, build-arm64, manifest]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.build-amd64.result == 'success' &&
      needs.build-arm64.result == 'success' &&
      (needs.manifest.result == 'success' || needs.manifest.result == 'skipped')
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6

      - name: Create deploy PR (UAT + prod)
        env:
          TAG: ${{ needs.set-tag.outputs.tag }}
          PREFIX: ${{ needs.set-tag.outputs.pr_prefix }}
          AGENT_CHANGED: ${{ needs.changes.outputs.agent }}
        run: |
          rm -rf /tmp/gitops
          git clone https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git /tmp/gitops
          cd /tmp/gitops

          # Close any existing mycroft deploy PRs to avoid ApplicationSet conflicts
          EXISTING_PRS=$(curl -s \
            -H "Authorization: token ${GITOPS_PAT}" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls?state=open&per_page=100" \
            | python3 -c "
          import json,sys
          for pr in json.load(sys.stdin):
              ref = pr.get('head',{}).get('ref','')
              if ref.startswith('deploy/mycroft-') or ref.startswith('release/mycroft-'):
                  print(pr['number'])
          " 2>/dev/null || true)
          for PR_NUM in $EXISTING_PRS; do
            echo "Closing superseded PR #${PR_NUM}"
            curl -s -X PATCH \
              -H "Authorization: token ${GITOPS_PAT}" \
              "https://api.github.com/repos/${GITOPS_REPO}/pulls/${PR_NUM}" \
              -d '{"state":"closed"}' > /dev/null
          done

          BRANCH="${PREFIX}/mycroft-${TAG}"
          git checkout -b "${BRANCH}"

          # Update coordinator image in both UAT and prod
          sed -i "s|image: amerenda/mycroft:coordinator-[^ ]*|image: amerenda/mycroft:coordinator-${TAG}|g" \
            apps/mycroft/backend-uat/deployment.yaml \
            apps/mycroft/backend/deployment.yaml

          # Only bump AGENT_IMAGE_TAG when agent containers were actually rebuilt
          if [[ "${AGENT_CHANGED}" == "true" ]]; then
            sed -i "s|value: \"sha-[^\"]*\"|value: \"${TAG}\"|g" \
              apps/mycroft/backend-uat/deployment.yaml \
              apps/mycroft/backend/deployment.yaml
          fi

          # Update frontend image
          sed -i "s|image: amerenda/mycroft:frontend-[^ ]*|image: amerenda/mycroft:frontend-${TAG}|g" \
            apps/mycroft/frontend/deployment.yaml

          git config user.name "amerenda-deploy-bot[bot]"
          git config user.email "3192609+amerenda-deploy-bot[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "${PREFIX}: mycroft ${TAG}"
          git push origin "${BRANCH}"

          # Build source link — prefer PR over raw commit
          COMMIT_MSG=$(git -C "${GITHUB_WORKSPACE}" log -1 --format='%s' 2>/dev/null || echo "")
          COMMIT_BODY=$(git -C "${GITHUB_WORKSPACE}" log -1 --format='%b' 2>/dev/null | head -5 || echo "")
          SOURCE_PR=$(curl -s \
            -H "Authorization: token ${GITOPS_PAT}" \
            "https://api.github.com/repos/amerenda/mycroft/commits/${GITHUB_SHA}/pulls" \
            | python3 -c "import json,sys; prs=json.load(sys.stdin); print(prs[0]['html_url'] if prs else '')" 2>/dev/null || true)
          if [ -n "${SOURCE_PR}" ]; then
            SOURCE_LINK="${SOURCE_PR}"
          else
            SOURCE_LINK="https://github.com/amerenda/mycroft/commit/${GITHUB_SHA}"
          fi

          NL=$'\n'
          PR_BODY="**[mycroft ${TAG}](${SOURCE_LINK})**${NL}${NL}${COMMIT_MSG}"
          if [ -n "${COMMIT_BODY}" ]; then
            PR_BODY="${PR_BODY}${NL}${NL}${COMMIT_BODY}"
          fi
          if [[ "${AGENT_CHANGED}" == "true" ]]; then
            IMAGES_NOTE="Images: \`coordinator-${TAG}\`, \`frontend-${TAG}\`, \`agent-coder-${TAG}\` (multi-arch: amd64+arm64)"
          else
            IMAGES_NOTE="Images: \`coordinator-${TAG}\`, \`frontend-${TAG}\` (multi-arch: amd64+arm64) — agent images unchanged"
          fi
          PR_BODY="${PR_BODY}${NL}${NL}${IMAGES_NOTE}${NL}Source: ${SOURCE_LINK}"

          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls" \
            -d "$(jq -n \
              --arg title "${PREFIX}: mycroft ${TAG}" \
              --arg body "${PR_BODY}" \
              --arg head "${BRANCH}" \
              --arg base "main" \
              '{title: $title, body: $body, head: $head, base: $base}')")

          PR_NUMBER=$(echo "$PR_RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['number'])")
          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            "https://api.github.com/repos/${GITOPS_REPO}/issues/${PR_NUMBER}/labels" \
            -d '["deploy:mycroft"]'

          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            "https://api.github.com/repos/${GITOPS_REPO}/issues/${PR_NUMBER}/assignees" \
            -d '{"assignees":["amerenda"]}'

  notify-failure:
    if: failure()
    needs: [test, changes, build-base-amd64, build-base-arm64, manifest-base, build-amd64, build-arm64, build-agents-amd64, build-agents-arm64, manifest, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue for build failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "CI failed: ${{ github.workflow }}" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "ci-failure" || echo "Could not create issue"
