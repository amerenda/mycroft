name: coder
display_name: "Coder"
description: "Single-agent pipeline: reads the repo, writes code, opens a pull request."

steps:
  - id: code
    agent: coder
    role: code
    max_iterations: 20
    tools:
      - read_file
      - write_file
      - patch_file
      - search_files
      - list_files
      - run_command
      - git_add
      - git_commit
      - git_push
      - git_diff
      - gh_create_pr
      - gh_comment
